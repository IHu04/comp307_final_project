<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Booking</title>
</head>
<style>
    body {
        margin: 0;
        background-color: lightgray;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        width: 850px;
        display: flex;
        align-items: flex-start;
        margin-top: 80px;
        margin-right: 80px;
        margin-left: 80px;
        background-color: white;
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .right {
        display: flex;
        width: 50%;
        justify-content: center;
        align-items: center;
        gap: 20px;
        padding-top: 5%;
       
    
    }

    .right img {
        width: 60px;
        height: auto; 
    }

    .right h2{
        font-size: 40px;
    }

    .left {
        display: flex;
        flex-direction: column;
        padding-top: 7%;

    }

    .left p {
        font-size: 25px;
    }

    .left-inside p {
        font-size: 18px;
    }

    .left-inside input {
        width: 200px;
        height: 20px;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 5px;
        
        background-color: white;
        border: 1px solid #ccc;
    } 

    .end {
        padding-top: 5%;
        padding-bottom: 10%;
    }

    .button {
        width: 90px;
        text-decoration: none;
        padding:10px;
        display: inline-block;
        background-color:#e2291e;
        color: white;
        text-align: center;
        border-radius: 10px;
        border: 1px solid #ccc;
    }

    .button:hover {
        background-color: #b22d0a;
    }

    button.button {
        cursor: pointer;
        font-size: inherit;
        font-family: inherit;
    }



</style>
<body>
    <div class="container">
        <div class="card">
            <div class="right">
                <img src="images/logo.svg" />
                <h2>McGill</h2>
            </div>
            <div class="left">
                <div class="intro">
                    <h2>Booking Login - Sign on to McGill's Booking Platform</h2>
                </div>
                 <div class="left-inside">
                    <p>McGill Student Login</p>
                    <div class="email-student">
                        <input type="email" id="email-stu" placeholder="username@mail.mcgill.ca">
                    </div>
                    <div class="pass-student">
                        <input type="password" id="pass-stu" placeholder="password">
                    </div>

                    <p>McGill Staff Login</p>
                    <div class="email-staff">
                        <input type="email" id="email-sta" placeholder="username@mcgill.ca">
                    </div>
                    <div class="pass-staff">
                        <input type="password" id="pass-sta" placeholder="password">
                    </div>

                    <p id="login-error" style="color:#e2291e;font-size:14px;display:none;"></p>
                 </div>

                 <div class="end">
                    <a href="homepage.html" class="button">Back</a>
                    <button type="button" id="btn-continue" class="button">Continue</button>
                 </div>



              
            </div>


        </div>
    </div>
<script>
  document.getElementById('btn-continue').addEventListener('click', async () => {
    const stuEmail = document.getElementById('email-stu').value.trim();
    const staEmail = document.getElementById('email-sta').value.trim();
    const errEl = document.getElementById('login-error');

    let email, password;
    if (stuEmail) {
      email = stuEmail;
      password = document.getElementById('pass-stu').value;
    } else if (staEmail) {
      email = staEmail;
      password = document.getElementById('pass-sta').value;
    } else {
      errEl.textContent = 'Please enter your email and password.';
      errEl.style.display = 'block';
      return;
    }

    errEl.style.display = 'none';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = 'homepage.html';
      } else {
        errEl.textContent = data.message || 'Login failed. Please try again.';
        errEl.style.display = 'block';
      }
    } catch {
      errEl.textContent = 'Network error. Please try again.';
      errEl.style.display = 'block';
    }
  });
</script>
</body>
</html>
