<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to McSlot</title>
</head>
<style>
    body {
        margin: 0;
        background-color: lightgray;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        width: 850px;
        display: flex;
        align-items: flex-start;
        margin-top: 80px;
        margin-right: 80px;
        margin-left: 80px;
        background-color: white;
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .right {
        display: flex;
        width: 50%;
        justify-content: center;
        align-items: center;
        gap: 20px;
        padding-top: 5%;


    }

    .right img {
        width: 60px;
        height: auto;
    }

    .right h2{
        font-size: 40px;
    }

    .left {
        display: flex;
        flex-direction: column;
        padding-top: 7%;

    }

    .left p {
        font-size: 25px;
    }

    .left-inside p {
        font-size: 18px;
    }

    .left-inside input {
        width: 200px;
        height: 20px;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 5px;

        background-color: white;
        border: 1px solid #ccc;
    }

    .end {
        padding-top: 5%;
        padding-bottom: 10%;
    }

    .button {
        width: 90px;
        text-decoration: none;
        padding:10px;
        display: inline-block;
        background-color:#e2291e;
        color: white;
        text-align: center;
        border-radius: 10px;
        border: 1px solid #ccc;
        cursor: pointer;
        font-size: 14px;
        font-family: inherit;
    }

    .button:hover {
        background-color: #b22d0a;

    }

    #err {
        color: #b22d0a;
        font-size: 14px;
        min-height: 18px;
        margin-top: 10px;
    }

</style>
<body>
    <div class="container">
        <div class="card">
            <div class="right">
                <img src="images/logo.svg" />
                <h2>McGill</h2>
            </div>
            <div class="left">
                <div class="intro">
                    <h2>McSlot Login - Sign on to McGill's Booking Platform</h2>
                </div>
                 <div class="left-inside">
                    <p>McGill Student Login</p>
                    <div class="email-student">
                        <input type="email" id="email-stu" placeholder="username@mail.mcgill.ca">
                    </div>
                    <div class="pass-student">
                        <input type="password" id="pass-stu" placeholder="password">
                    </div>

                    <p>McGill Staff Login</p>
                    <div class="email-staff">
                        <input type="email" id="email-sta" placeholder="username@mcgill.ca">
                    </div>
                    <div class="pass-staff">
                        <input type="password" id="pass-sta" placeholder="password">
                    </div>

                    <div id="err"></div>

                 </div>

                 <div class="end">
                    <a href="homepage.html" class="button">Back</a>
                    <button class="button" id="continueBtn" type="button">Continue</button>
                 </div>
            </div>


        </div>
    </div>

<script src="shared.js"></script>
<script>
(async function () {
    // Already logged in? Go to dashboard.
    const existing = await API.getUser();
    if (existing) {
        window.location.href = existing.isOwner ? 'owner-view.html' : 'view.html';
        return;
    }
})();

document.getElementById('continueBtn').addEventListener('click', async () => {
    const err = document.getElementById('err');
    err.textContent = '';

    const stuEmail = document.getElementById('email-stu').value.trim();
    const stuPass  = document.getElementById('pass-stu').value;
    const staEmail = document.getElementById('email-sta').value.trim();
    const staPass  = document.getElementById('pass-sta').value;

    let email, password;
    if (stuEmail || stuPass) {
        email = stuEmail;
        password = stuPass;
    } else if (staEmail || staPass) {
        email = staEmail;
        password = staPass;
    } else {
        err.textContent = 'Please enter your email and password.';
        return;
    }

    if (!email || !password) {
        err.textContent = 'Both email and password are required.';
        return;
    }

    try {
        const data = await API.post('/auth/login', { email, password });
        const user = data.user;
        window.location.href = user.isOwner ? 'owner-view.html' : 'view.html';
    } catch (e) {
        err.textContent = e.message || 'Login failed.';
    }
});
</script>
</body>
</html>
