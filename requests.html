<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Meetings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<style>
    body {
        margin: 0;
        background-color: lightgray;
    }

    .container {

    }

    .dashboard {
            width: 270px;
            height: 100vh;
            border-top-right-radius: 35px;
            border-bottom-right-radius: 35px;
            background-color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }


        .slide button {
            position: absolute;
            left: 270px;
            top: 5px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            border: none;
            background: transparent;
        }




        .slide {
            width: 270px;
      
            position: fixed;
            left: 0;
            transition: transform 0.3s ease-in-out;
            
        }

        .slide.hidden {
            transform: translateX(-270px);
        }


        .dashboard div {
            display: flex;
            align-items: center;  
            margin-left: 20px;
        }



        .d1 {
            padding-top: 30px;
        }

        .dashboard img {
            width:50px;
            height:auto;
            margin-left: 15px;
        }

        .dashboard a {
            text-decoration: none;
            color: black;
            font-size: 20px;

        }

        .d4 {
            background-color: lightgray;
            margin-left: 20px;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
            
        }


        .dashboard div:not(.d4, .okay, .pic):hover {
            background-color: #f6f6f6;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
        }

        .okay {
            border-top-right-radius: 20px;
            gap: 10px;
            padding-top: 50px;
            padding-bottom: 10px;
            padding-left: 20px;
        }

        .pic {
            margin-top: auto;
            padding-bottom: 100px;
        }

        .pic img {
            width: 60px;
            height: auto;
            display: block;
        
            padding-right: 18px;
        }

        .topnav {
            display: flex;
            z-index: 9999;
            top:0;
            position: sticky;
            height: 75px;
            padding-right: 20px;
            align-items: center;
            background-color: #ED1B2F;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        
        }

        .right {
            display: flex;
            justify-content: flex-end;
            margin-left: auto;
        }

        .right a{
            text-decoration: none;
            color: white;
            padding: 24px 12px;
            font-size: 18px;
            
        }

        .right a:hover {
            text-decoration: underline;
        }

        .left {
            display: flex;
            padding-left: 20px;
           
        }

        .left h3{
            
            color: white;
            font-size: 30px;
        }

        .ok {
            display: flex;
        }

        .main {
            margin-left: 310px;
            padding: 30px;
            width: 100vw;
            transition: margin-left 0.3s ease;
        }

        .main.shifted {
            margin-left: 0;
        }

        .main p {
            margin-top: -10px;
            color: #8f8f8f;
        }

        .button {
            border: none;
            background-color: transparent;
            font-size: 17px;
            padding: 10px 10px 10px 10px;
            font-family: 'Times New Roman', Times, serif;
            color: white;
        }

        #yikes {
            border-top-left-radius: 15px;
            padding-left: 15px;
        }

        .button:hover {
            background-color:white;
            color:#ED1B2F;
            
        }

        .button.active {
            background-color: white;
            color:#ED1B2F;
        }

        .ok1 {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            background-color:#ED1B2F;
            margin-left: -15px;         
        }

        .tab {
            padding-top: 10px;
            background-color: white;
            padding-left: 10px;
       
        }


        .view {

            background-color: white;
            padding-left: 15px;
            border-radius: 15px;
            padding-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
          
        }

        .row {
    
            display: grid;
            grid-template-columns: 2fr 2fr 2fr 1fr 2fr;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .row button {
            background-color: transparent;
            cursor: pointer;
            padding: 5px 5px 5px 5px;
            border: 1px solid #1e78de;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            color: #1e78de;
            margin-right: 7px;
            border-radius: 5px;
        }

        .row button:hover {
            border: 1px solid #ED1B2F;
            color:#ED1B2F;
        }




 

  




</style>

<body>
    <div class="container">

        <div class="topnav">

            <div class="left">
                <h3>McGill McSlot</h3>
            </div>

            <div class="right">
                <a href="homepage.html">Home</a>
                <a href="account.html">My Account</a>
            </div>

        </div>
        <br>

        <div class="ok">
            <div class="slide" id="slide1">

                    <div class="dashboard">

                        <div class="okay">
                            <h2 id="welcome-h">Welcome!</h2>
                        </div>

                        <div class="d2">
                            <img src="images/Dash.png" />
                            <a href="owner-view.html">Dashboard</a>
                        </div>

                        <div class="d3">
                            <img src="images/Book.png" />
                            <a href="owner-book.html">Create Slots</a>
                        </div>

                        <div class="d4">
                            <img src="images/finder.png" />
                            <a href="requests.html">Booking Requests</a>
                        </div>

                        <div class="d5">
                            <img src="images/account.png" />
                            <a href="homepage.html">Home</a>
                        </div>

                        <div class="d6">
                            <img src="images/logout.png" />
                            <a href="#" onclick="API.logout();return false;">Logout</a>
                        </div>

                        <div class="pic">
                            <img src="images/logo-ssmu.svg" />
                        </div>
                    
                    </div>

                    <button onclick="toggleDash()"><i class="fa fa-bars"></i></button>

                    
                </div>

                <div class="main">

                    <div class="name"> 
                        <h2>Requested Booking List</h2>
                        <p>View your meeting requests here. Accept or decline them as needed.</p>

     
                    </div>

                    <div class="view">
                        <div class="ok1">
                            <button class="button active" id="yikes">Requested Bookings</button>
                        </div>

                        <div id="meetings" class="tab">

                            <div class="row header">
                                <div>Date</div>
                                <div>Time</div>
                                <div>Meeting With</div>
                                <div>Location</div>
                                <div>Actions</div>
                            </div>

                            <div id="requestedList"></div>


                        </div>

                </div>


        </div>

        


    </div>



   <script src="shared.js"></script>
   <script>

        function toggleDash() {
            document.getElementById("slide1").classList.toggle("hidden");
            document.querySelector(".main").classList.toggle("shifted");
        }


        async function loadRequests() {
            const container = document.getElementById("requestedList");
            container.innerHTML = "";

            let requests = [];
            try {
                const data = await API.get('/meeting-requests/received?status=pending');
                requests = data.requests || data || [];
            } catch (e) {
                container.innerHTML = `<div style="padding:12px;color:#c00">Failed to load requests: ${e.message}</div>`;
                return;
            }

            if (!requests.length) {
                container.innerHTML = '<div style="padding:12px;color:#888;font-size:14px">No pending requests.</div>';
                return;
            }

            requests.forEach(r => {
                const row = document.createElement("div");
                row.className = "row";
                const requester = r.requester || {};
                const name = (requester.firstName || '') + ' ' + (requester.lastName || '');
                const email = requester.email || '';
                const created = r.createdAt ? new Date(r.createdAt).toLocaleDateString() : '';

                row.innerHTML = `
                    <div>${created}</div>
                    <div>${(r.message || '').replace(/</g,'&lt;').slice(0,60)}</div>
                    <div>${name.trim() || email}</div>
                    <div>${email}</div>
                    <div>
                        <button onclick="acceptRequest(${r.id}, '${email}')">Accept</button>
                        <button onclick="declineRequest(${r.id})">Decline</button>
                    </div>
                `;

                container.appendChild(row);
            });
        }

        async function acceptRequest(id, email) {
            const date = prompt("Meeting date (YYYY-MM-DD):");
            if (!date) return;
            const startTime = prompt("Start time (HH:MM, 24h):");
            if (!startTime) return;
            const endTime = prompt("End time (HH:MM, 24h):");
            if (!endTime) return;

            try {
                const res = await API.patch(`/meeting-requests/${id}`, {
                    status: 'accepted', date, startTime, endTime,
                });
                if (res && res.notifyRequesterMailto) {
                    window.open(res.notifyRequesterMailto, '_blank');
                }
                await loadRequests();
            } catch (e) {
                alert('Could not accept: ' + e.message);
            }
        }

        async function declineRequest(id) {
            if (!confirm('Decline this request?')) return;
            try {
                const res = await API.patch(`/meeting-requests/${id}`, { status: 'declined' });
                if (res && res.notifyRequesterMailto) {
                    window.open(res.notifyRequesterMailto, '_blank');
                }
                await loadRequests();
            } catch (e) {
                alert('Could not decline: ' + e.message);
            }
        }

        async function init() {
            const user = await API.requireOwner();
            if (!user) return;
            document.getElementById('welcome-h').textContent =
                `Welcome, ${user.firstName || 'user'}!`;
            await loadRequests();
        }

        init();






    </script>
</body>
</html>
