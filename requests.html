<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Meetings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<style>
    body {
        margin: 0;
        background-color: lightgray;
        animation: pagein 0.15s ease;
    }

    @keyframes pagein {
        from { opacity: 0; }
        to   { opacity: 1; }
    }

    .container {

    }

    .dashboard {
            width: 270px;
            height: 100vh;
            border-top-right-radius: 35px;
            border-bottom-right-radius: 35px;
            background-color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }


        .slide button {
            position: absolute;
            left: 270px;
            top: 5px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            border: none;
            background: transparent;
        }




        .slide {
            width: 270px;
      
            position: fixed;
            left: 0;
            transition: transform 0.3s ease-in-out;
            
        }

        .slide.hidden {
            transform: translateX(-270px);
        }


        .dashboard div {
            display: flex;
            align-items: center;  
            margin-left: 20px;
        }



        .d1 {
            padding-top: 30px;
        }

        .dashboard img {
            width:50px;
            height:auto;
            margin-left: 15px;
        }

        .dashboard a {
            text-decoration: none;
            color: black;
            font-size: 20px;

        }

        .d4 {
            background-color: lightgray;
            margin-left: 20px;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
            
        }


        .dashboard div:not(.d4, .okay, .pic):hover {
            background-color: #f6f6f6;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
        }

        .okay {
            border-top-right-radius: 20px;
            gap: 10px;
            padding-top: 50px;
            padding-bottom: 10px;
            padding-left: 20px;
        }

        .pic {
            margin-top: auto;
            padding-bottom: 100px;
        }

        .pic img {
            width: 60px;
            height: auto;
            display: block;
        
            padding-right: 18px;
        }

        .topnav {
            display: flex;
            z-index: 9999;
            top:0;
            position: sticky;
            height: 75px;
            padding-right: 20px;
            align-items: center;
            background-color: #ED1B2F;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        
        }

        .right {
            display: flex;
            justify-content: flex-end;
            margin-left: auto;
        }

        .right a{
            text-decoration: none;
            color: white;
            padding: 24px 12px;
            font-size: 18px;
            
        }

        .right a:hover {
            text-decoration: underline;
        }

        .left {
            display: flex;
            padding-left: 20px;
           
        }

        .left h3{
            
            color: white;
            font-size: 30px;
        }

        .ok {
            display: flex;
        }

        .main {
            margin-left: 310px;
            padding: 30px;
            width: 100vw;
            transition: margin-left 0.3s ease;
        }

        .main.shifted {
            margin-left: 0;
        }

        .main p {
            margin-top: -10px;
            color: #8f8f8f;
        }

        .button {
            border: none;
            background-color: transparent;
            font-size: 17px;
            padding: 10px 10px 10px 10px;
            font-family: 'Times New Roman', Times, serif;
            color: white;
        }

        #yikes {
            border-top-left-radius: 15px;
            padding-left: 15px;
        }

        .button:hover {
            background-color:white;
            color:#ED1B2F;
            
        }

        .button.active {
            background-color: white;
            color:#ED1B2F;
        }

        .ok1 {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            background-color:#ED1B2F;
            margin-left: -15px;         
        }

        .tab {
            padding-top: 10px;
            background-color: white;
            padding-left: 10px;
       
        }


        .view {

            background-color: white;
            padding-left: 15px;
            border-radius: 15px;
            padding-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
          
        }

        .row {
            display: grid;
            grid-template-columns: 2fr 2fr 2fr 1fr 2fr;
            padding: 10px;
            border-bottom: 1px solid #ddd;
            flex-wrap: wrap;
        }

        .row.expanded {
            grid-template-columns: 1fr;
            border-bottom: none;
        }

        .row-main {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 2fr 2fr 2fr 1fr 2fr;
            align-items: center;
            gap: 8px;
        }

        .row button {
            background-color: transparent;
            cursor: pointer;
            padding: 5px 5px 5px 5px;
            border: 1px solid #1e78de;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            color: #1e78de;
            margin-right: 7px;
            border-radius: 5px;
        }

        .row button:hover {
            border: 1px solid #ED1B2F;
            color:#ED1B2F;
        }

        .accept-panel {
            grid-column: 1 / -1;
            background: #f5f8ff;
            border: 1px solid #c4d4f0;
            border-radius: 10px;
            padding: 14px 16px;
            margin: 6px 0 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .accept-panel label {
            display: flex;
            flex-direction: column;
            font-size: 12px;
            color: #555;
            font-weight: 600;
            gap: 4px;
        }

        .accept-panel input {
            padding: 6px 8px;
            border: 1px solid #bbb;
            border-radius: 6px;
            font-size: 13px;
            background: white;
        }

        .accept-panel input:focus {
            outline: none;
            border-color: #1e78de;
        }

        .btn-confirm-accept {
            padding: 7px 16px;
            background: #1e78de;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-confirm-accept:hover { background: #155faf; }

        .btn-cancel-accept {
            padding: 7px 14px;
            background: white;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-cancel-accept:hover { border-color: #ED1B2F; color: #ED1B2F; }

        .accept-err { font-size: 12px; color: #b22d0a; width: 100%; margin-top: -6px; }




 

  




</style>

<body>
    <div class="container">

        <div class="topnav">

            <div class="left">
                <h3>McGill McSlot</h3>
            </div>

            <div class="right">
                <a href="homepage.html">Home</a>
                <a href="account.html">My Account</a>
            </div>

        </div>
        <br>

        <div class="ok">
            <div class="slide" id="slide1">

                    <div class="dashboard">

                        <div class="okay">
                            <h2 id="welcome-h">Welcome!</h2>
                        </div>

                        <div class="d2">
                            <img src="images/Dash.png" />
                            <a href="owner-view.html">Dashboard</a>
                        </div>

                        <div class="d3">
                            <img src="images/Book.png" />
                            <a href="owner-book.html">Create Slots</a>
                        </div>

                        <div class="d4">
                            <img src="images/finder.png" />
                            <a href="requests.html">Booking Requests</a>
                        </div>

                        <div class="d5">
                            <img src="images/finder.png" />
                            <a href="teamup.html">TeamFinder</a>
                        </div>

                        <div class="d6">
                            <img src="images/logout.png" />
                            <a href="#" onclick="API.logout();return false;">Logout</a>
                        </div>

                        <div class="pic">
                            <img src="images/logo-ssmu.svg" />
                        </div>
                    
                    </div>

                    <button onclick="toggleDash()"><i class="fa fa-bars"></i></button>

                    
                </div>

                <div class="main">

                    <div class="name"> 
                        <h2>Requested Booking List</h2>
                        <p>View your meeting requests here. Accept or decline them as needed.</p>

     
                    </div>

                    <div class="view">
                        <div class="ok1">
                            <button class="button active" id="yikes">Requested Bookings</button>
                        </div>

                        <div id="meetings" class="tab">

                            <div class="row header">
                                <div>Date</div>
                                <div>Time</div>
                                <div>Meeting With</div>
                                <div>Location</div>
                                <div>Actions</div>
                            </div>

                            <div id="requestedList"></div>


                        </div>

                </div>


        </div>

        


    </div>



   <script src="shared.js"></script>
   <script>

        function toggleDash() {
            document.getElementById("slide1").classList.toggle("hidden");
            document.querySelector(".main").classList.toggle("shifted");
        }


        async function loadRequests() {
            const container = document.getElementById("requestedList");
            container.innerHTML = "";

            let requests = [];
            try {
                const data = await API.get('/meeting-requests/received?status=pending');
                requests = data.requests || data || [];
            } catch (e) {
                container.innerHTML = `<div style="padding:12px;color:#c00">Failed to load requests: ${e.message}</div>`;
                return;
            }

            if (!requests.length) {
                container.innerHTML = '<div style="padding:12px;color:#888;font-size:14px">No pending requests.</div>';
                return;
            }

            requests.forEach(r => {
                const row = document.createElement("div");
                row.className = "row";
                row.id = `req-row-${r.id}`;
                const requester = r.requester || {};
                const name = (requester.firstName || '') + ' ' + (requester.lastName || '');
                const email = requester.email || '';
                const created = r.createdAt ? new Date(r.createdAt).toLocaleDateString() : '';
                // default date to today for convenience
                const today = new Date().toISOString().slice(0, 10);

                row.innerHTML = `
                    <div class="row-main">
                        <div>${created}</div>
                        <div>${(r.message || '').replace(/</g,'&lt;').slice(0,60)}</div>
                        <div>${name.trim() || email}</div>
                        <div>${email}</div>
                        <div>
                            <button onclick="toggleAcceptPanel(${r.id}, '${email}')">Accept</button>
                            <button onclick="declineRequest(${r.id})">Decline</button>
                        </div>
                    </div>
                    <div class="accept-panel" id="accept-panel-${r.id}" style="display:none">
                        <label>Date
                            <input type="date" id="acc-date-${r.id}" min="${today}" value="${today}" />
                        </label>
                        <label>Start time
                            <input type="time" id="acc-start-${r.id}" />
                        </label>
                        <label>End time
                            <input type="time" id="acc-end-${r.id}" />
                        </label>
                        <div style="display:flex;gap:8px;align-items:center">
                            <button class="btn-confirm-accept" onclick="submitAccept(${r.id}, '${email}')">Confirm</button>
                            <button class="btn-cancel-accept" onclick="toggleAcceptPanel(${r.id})">Cancel</button>
                        </div>
                        <div class="accept-err" id="acc-err-${r.id}"></div>
                    </div>
                `;

                container.appendChild(row);
            });
        }

        function toggleAcceptPanel(id) {
            const panel = document.getElementById(`accept-panel-${id}`);
            const row = document.getElementById(`req-row-${id}`);
            const open = panel.style.display !== 'none';
            panel.style.display = open ? 'none' : 'grid';
            row.style.borderBottom = open ? '' : 'none';
            document.getElementById(`acc-err-${id}`).textContent = '';
        }

        async function submitAccept(id, email) {
            const date      = document.getElementById(`acc-date-${id}`).value;
            const startTime = document.getElementById(`acc-start-${id}`).value;
            const endTime   = document.getElementById(`acc-end-${id}`).value;
            const err       = document.getElementById(`acc-err-${id}`);

            err.textContent = '';
            if (!date)      { err.textContent = 'Please pick a date.'; return; }
            if (!startTime) { err.textContent = 'Please pick a start time.'; return; }
            if (!endTime)   { err.textContent = 'Please pick an end time.'; return; }
            if (endTime <= startTime) { err.textContent = 'End time must be after start time.'; return; }

            try {
                const res = await API.patch(`/meeting-requests/${id}`, {
                    status: 'accepted', date, startTime, endTime,
                });
                if (res && res.notifyRequesterMailto) {
                    window.open(res.notifyRequesterMailto, '_blank');
                }
                await loadRequests();
            } catch (e) {
                err.textContent = e.message || 'Could not accept.';
            }
        }

        async function declineRequest(id) {
            if (!confirm('Decline this request?')) return;
            try {
                const res = await API.patch(`/meeting-requests/${id}`, { status: 'declined' });
                if (res && res.notifyRequesterMailto) {
                    window.open(res.notifyRequesterMailto, '_blank');
                }
                await loadRequests();
            } catch (e) {
                alert('Could not decline: ' + e.message);
            }
        }

        async function init() {
            const user = await API.requireOwner();
            if (!user) return;
            document.getElementById('welcome-h').textContent =
                `Welcome, ${user.firstName || 'user'}!`;
            await loadRequests();
        }

        init();

        // fade out before navigating so sidebar clicks don't flash
        document.querySelectorAll('.slide a[href]').forEach(a => {
            a.addEventListener('click', e => {
                const href = a.getAttribute('href');
                if (!href || href === '#') return;
                e.preventDefault();
                document.body.style.transition = 'opacity 0.15s ease';
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = href; }, 150);
            });
        });
    </script>
</body>
</html>
