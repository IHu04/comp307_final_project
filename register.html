<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register to Booking</title>
</head>
<style>

body {
    margin: 0;
    background-color: lightgray;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}


.card {
    background-color: white;
    width: 600px;
    padding: 50px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}


.toggle {
    display: flex;
    border: 1px solid #ccc;
    margin-bottom: 20px;
}

.card input[type="radio"]{
    display: none;
}


.toggle label {
    flex: 1;
    text-align: center;
    padding: 10px;
    cursor: pointer;
    background-color: lightgray;
}

#student:checked ~ .toggle label[for="student"] {
    background-color: #e2291e;
    color: white;
}

#staff:checked ~ .toggle label[for="staff"] {
    background-color: #e2291e;
    color: white;
}

.student-role, .staff-role {
    display: none;
}

#student:checked ~ .student-role {
    display: block;
}

#staff:checked ~ .staff-role {
    display: block;
}

input[type="text"], input[type="email"], input[type="password"] {
    width: 577px;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid lightgray;
    box-sizing: border-box;
    width: 100%;
}

.name-row {
    display: flex;
    gap: 10px;
}

.name-row input { flex: 1; }

.student-role p, .staff-role p {
    margin-bottom: 5px;
}

.info p {
    color:darkgray;
    font-size: 14px;
    margin-top: -3px;
}

#err {
    color: #b22d0a;
    font-size: 14px;
    min-height: 18px;
    margin-top: 5px;
}

.signup {
    display: flex;
    gap: 10px;
}

.button {
    text-decoration: none;
    color: white;
    background-color: #e2291e;
    width: 350px;
    flex: 1;
    padding:10px;
    display: inline-block;
    border-radius: 10px;
    text-align: center;
    border: 1px solid #ccc;
    margin-top: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
}

.button:hover {
    background-color: #b22d0a;;
}

</style>



<body>

<div class="card">
    <h2>Register to McGill's Booking Platform</h2>
    <input type="radio" name="role" id="student" checked>
    <input type="radio" name="role" id="staff">


    <div class="toggle">
        <label for="student">Student</label>
        <label for="staff">Staff</label>
    </div>


    <div class="student-role">
        <div class="name-row">
            <input type="text" id="stu-first" placeholder="First name">
            <input type="text" id="stu-last" placeholder="Last name">
        </div>
        <p>McGill Student Email</p>
        <input type="email" id="stu-email" placeholder="username@mail.mcgill.ca">
        <p>Password</p>
        <input type="password" id="stu-pass1" placeholder="password">
        <div class="info"><p>Use 8 or more characters with a mix of letters, numbers, & symbols.</p>
        </div>
        <p>Repeat Password</p>
        <input type="password" id="stu-pass2" placeholder="password">
    </div>


    <div class="staff-role">
        <div class="name-row">
            <input type="text" id="sta-first" placeholder="First name">
            <input type="text" id="sta-last" placeholder="Last name">
        </div>
        <p>McGill Staff Email</p>
        <input type="email" id="sta-email" placeholder="username@mcgill.ca">
        <p>Password</p>
        <input type="password" id="sta-pass1" placeholder="password">
        <div class="info"><p>Use 8 or more characters with a mix of letters, numbers, & symbols.</p>
        </div>
        <p>Repeat Password</p>
        <input type="password" id="sta-pass2" placeholder="password">

    </div>

    <div id="err"></div>

    <div class="signup">
        <a href="homepage.html" class="button">Back</a>
        <button class="button" id="registerBtn" type="button">Register</button>
    </div>

</div>

<script src="shared.js"></script>
<script>
(async function () {
    const existing = await API.getUser();
    if (existing) {
        window.location.href = existing.isOwner ? 'owner-view.html' : 'view.html';
    }
})();

document.getElementById('registerBtn').addEventListener('click', async () => {
    const err = document.getElementById('err');
    err.textContent = '';

    const isStaff = document.getElementById('staff').checked;
    const prefix = isStaff ? 'sta' : 'stu';
    const firstName = document.getElementById(`${prefix}-first`).value.trim();
    const lastName  = document.getElementById(`${prefix}-last`).value.trim();
    const email     = document.getElementById(`${prefix}-email`).value.trim();
    const pass1     = document.getElementById(`${prefix}-pass1`).value;
    const pass2     = document.getElementById(`${prefix}-pass2`).value;

    if (!firstName || !lastName) {
        err.textContent = 'First name and last name are required.';
        return;
    }
    if (!email) { err.textContent = 'Email is required.'; return; }
    if (pass1.length < 8) { err.textContent = 'Password must be at least 8 characters.'; return; }
    if (pass1 !== pass2)  { err.textContent = 'Passwords do not match.'; return; }

    // Surface correct-domain hint early
    if (isStaff && !/@mcgill\.ca$/i.test(email)) {
        err.textContent = 'Staff email must end in @mcgill.ca';
        return;
    }
    if (!isStaff && !/@mail\.mcgill\.ca$/i.test(email)) {
        err.textContent = 'Student email must end in @mail.mcgill.ca';
        return;
    }

    try {
        const data = await API.post('/auth/register', {
            email, password: pass1, firstName, lastName,
        });
        const user = data.user;
        window.location.href = user.isOwner ? 'owner-view.html' : 'view.html';
    } catch (e) {
        err.textContent = e.message || 'Registration failed.';
    }
});
</script>

</body>
</html>
