<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Booking</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #d9d9d9;
}

/* NAVBAR */
.topnav {
    height: 80px;
    display: flex;
    align-items: center;
    background: #e2291e;
    padding: 0 20px;
    color: white;
}

.nav-left h2 {
    margin: 0;
    font-size: 28px;
}

.nav-right {
    margin-left: auto;
    display: flex;
    align-items: center;
}

.nav-right a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 16px;
}

/* CENTER */
.page {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 80px);
}

/* CARD */
.card {
    background: white;
    padding: 40px;
    border-radius: 10px;
    width: 400px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.confirm {
    background: #e2291e;
    color: white;
}

.cancel {
    background: white;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="topnav">
    <div class="nav-left">
        <h2>McGill Bookings</h2>
    </div>
    <div class="nav-right">
        <a href="book.html">Book</a>
        <a href="view.html">My Bookings</a>
        <a href="teamup.html">Team Up</a>
        <a href="#" onclick="API.logout()">Logout</a>
    </div>
</div>

<div class="page">

<div class="card">
    <h2>Confirm Booking</h2>

    <div id="info"></div>

    <button class="confirm" onclick="confirmBooking()">Confirm</button>
    <button class="cancel" onclick="goBack()">Cancel</button>
</div>

</div>

<script src="shared.js"></script>

<script>
let pending = null;

function timeShort(t) {
  if (t == null) return '';
  const s = String(t);
  return s.length >= 5 ? s.slice(0, 5) : s;
}

function loadPending() {
  const raw = sessionStorage.getItem('pendingBooking');
  if (!raw) return null;
  try {
    const p = JSON.parse(raw);
    if (p && p.slotId != null && p.slotId !== '') return p;
  } catch (_) {}
  return null;
}

function renderSummary() {
  const info = document.getElementById('info');
  info.innerHTML = '';

  const isMeeting = pending.slotType === 'meeting_request';
  const badgeLabel = isMeeting ? 'Meeting' : 'Office Hours';
  const badgeBg = isMeeting ? '#e8f1ff' : '#eaf7ea';
  const badgeColor = isMeeting ? '#1e78de' : '#2a7a2a';
  const badge = document.createElement('div');
  badge.style.cssText = 'margin-bottom:12px';
  badge.innerHTML = `<span style="background:${badgeBg};color:${badgeColor};font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px;letter-spacing:.3px">${badgeLabel}</span>`;
  info.appendChild(badge);

  const lines = [
    ['Professor:', pending.ownerName || 'Professor'],
    ['Date:', pending.date || ''],
    ['Time:', `${timeShort(pending.startTime)} - ${timeShort(pending.endTime)}`.trim()],
  ];
  for (const [label, value] of lines) {
    const p = document.createElement('p');
    const b = document.createElement('b');
    b.textContent = label + ' ';
    p.appendChild(b);
    p.appendChild(document.createTextNode(value));
    info.appendChild(p);
  }
}

async function confirmBooking() {
  const btn = document.querySelector('.confirm');
  btn.textContent = 'Booking...';
  btn.disabled = true;

  try {
    const data = await API.post(`/slots/${pending.slotId}/book`);
    sessionStorage.removeItem('pendingBooking');
    if (data && data.notifyOwnerMailto) {
      window.open(data.notifyOwnerMailto, '_blank');
    }
    alert('Booking confirmed!');
    window.location.href = 'view.html';
  } catch (e) {
    alert('Booking failed: ' + (e.message || 'Unknown error'));
    btn.textContent = 'Confirm';
    btn.disabled = false;
  }
}

function goBack() {
  const p = loadPending();
  const url = p && p.returnUrl ? p.returnUrl : 'book.html';
  window.location.href = url;
}

(async function init() {
  const user = await API.requireAuth();
  if (!user) return;
  if (user.isOwner) {
    sessionStorage.removeItem('pendingBooking');
    window.location.replace('owner-view.html');
    return;
  }

  pending = loadPending();
  if (!pending) {
    window.location.replace('book.html');
    return;
  }

  renderSummary();
})();
</script>

</body>
</html>
