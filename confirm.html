<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Booking</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #d9d9d9;
}

/* NAVBAR */
.topnav {
    height: 80px;
    display: flex;
    align-items: center;
    background: #e2291e;
    padding: 0 20px;
    color: white;
}

.nav-left h2 {
    margin: 0;
    font-size: 28px;
}

.nav-right {
    margin-left: auto;
    display: flex;
    align-items: center;
}

.nav-right a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 16px;
}

.nav-right a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
}

/* CENTER */
.page {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 80px);
}

/* CARD */
.card {
    background: white;
    padding: 40px;
    border-radius: 10px;
    width: 400px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.confirm {
    background: #e2291e;
    color: white;
}

.cancel {
    background: white;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="topnav">
    <div class="nav-left">
        <h2>McGill Bookings</h2>
    </div>
    <div class="nav-right">
        <a href="book.html">Book</a>
        <a href="view.html">My Bookings</a>
        <a href="teamup.html">Team Up</a>
        <a href="#" onclick="API.logout()">Logout</a>
    </div>
</div>

<div class="page">

<div class="card">
    <h2>Confirm Booking</h2>

    <div id="info"></div>

    <button class="confirm" onclick="confirmBooking()">Confirm</button>
    <button class="cancel" onclick="goBack()">Cancel</button>
</div>

</div>

<script src="shared.js"></script>

<script>
const pending = JSON.parse(sessionStorage.getItem('pendingBooking'));

// If someone lands here without going through book.html, send them back
if (!pending) window.location.href = 'book.html';

document.getElementById('info').innerHTML = `
  <p><b>Professor:</b> ${pending.ownerName}</p>
  <p><b>Date:</b> ${pending.date}</p>
  <p><b>Time:</b> ${pending.startTime.slice(0,5)} – ${pending.endTime.slice(0,5)}</p>
`;

async function confirmBooking() {
  const btn = document.querySelector('.confirm');
  btn.textContent = 'Booking...';
  btn.disabled = true;

  try {
    await API.post(`/slots/${pending.slotId}/book`);
    sessionStorage.removeItem('pendingBooking');
    alert('Booking confirmed!');
    window.location.href = 'view.html';
  } catch (e) {
    alert('Booking failed: ' + e.message);
    btn.textContent = 'Confirm';
    btn.disabled = false;
  }
}

function goBack() {
  window.location.href = 'book.html';
}

// Auth guard
API.requireAuth();
</script>

</body>
</html>
