<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Meetings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>
<style>
    body {
        margin: 0;
        background-color: lightgray;
        animation: pagein 0.15s ease;
    }

    @keyframes pagein {
        from { opacity: 0; }
        to   { opacity: 1; }
    }

    .container {

    }

    .dashboard {
            width: 270px;
            height: 100vh;
            border-top-right-radius: 35px;
            border-bottom-right-radius: 35px;
            background-color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }


        .slide button {
            position: absolute;
            left: 270px;
            top: 5px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            border: none;
            background: transparent;
        }




        .slide {
            width: 270px;
      
            position: fixed;
            left: 0;
            transition: transform 0.3s ease-in-out;
            
        }

        .slide.hidden {
            transform: translateX(-270px);
        }


        .dashboard div {
            display: flex;
            align-items: center;  
            margin-left: 20px;
        }



        .d1 {
            padding-top: 30px;
        }

        .dashboard img {
            width:50px;
            height:auto;
            margin-left: 15px;
        }

        .dashboard a {
            text-decoration: none;
            color: black;
            font-size: 20px;

        }

        .d2 {
            background-color: lightgray;
            margin-left: 20px;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
            
        }


        .dashboard div:not(.d2, .okay, .pic):hover {
            background-color: #f6f6f6;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
        }

        .okay {
            border-top-right-radius: 20px;
            gap: 10px;
            padding-top: 50px;
            padding-bottom: 10px;
            padding-left: 20px;
        }

        .pic {
            margin-top: auto;
            padding-bottom: 100px;
        }

        .pic img {
            width: 60px;
            height: auto;
            display: block;
        
            padding-right: 18px;
        }

        .topnav {
            display: flex;
            z-index: 9999;
            top:0;
            position: sticky;
            height: 75px;
            padding-right: 20px;
            align-items: center;
            background-color: #ED1B2F;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        
        }

        .right {
            display: flex;
            justify-content: flex-end;
            margin-left: auto;
        }

        .right a{
            text-decoration: none;
            color: white;
            padding: 24px 12px;
            font-size: 18px;
            
        }

        .right a:hover {
            text-decoration: underline;
        }

        .left {
            display: flex;
            padding-left: 20px;
           
        }

        .left h3{
            
            color: white;
            font-size: 30px;
        }

        .ok {
            display: flex;
        }

        .main {
            margin-left: 310px;
            padding: 30px;
            width: 100vw;
            transition: margin-left 0.3s ease;
        }

        .main.shifted {
            margin-left: 0;
        }

        .main p {
            margin-top: -10px;
            color: #8f8f8f;
        }

        .button {
            border: none;
            background-color: transparent;
            font-size: 17px;
            padding: 10px 10px 10px 10px;
            font-family: 'Times New Roman', Times, serif;
            color: white;
            transition: 0.2s;
        }

        #yikes {
            border-top-left-radius: 15px;
            padding-left: 15px;
        }

        .button:hover {
            background-color:white;
            color:#ED1B2F;
            
        }

        .button.active {
            background-color: white;
            color:#ED1B2F;
        }

        .ok1 {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            background-color:#ED1B2F;
            margin-left: -15px;         
        }

        .tab {
            padding-top: 10px;
            background-color: white;
            padding-left: 10px;
       
        }

        .view {
            background-color: white;
            padding-left: 15px;
            border-radius: 15px;
            padding-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
          
        }

        .row {
            display: grid;
            grid-template-columns: 2fr 2fr 2fr 1fr 2fr;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .row button {
            background-color: transparent;
            cursor: pointer;
            padding: 5px 5px 5px 5px;
            border: 1px solid #1e78de;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            color: #1e78de;
            margin-right: 7px;
            border-radius: 5px;
        }

        .row button:hover {
            border: 1px solid #ED1B2F;
            color:#ED1B2F;
        }

        .m {
            display: flex;
            flex-direction: row;
            align-items: center;
            
        }

        .m button {
            margin-left: auto;
            padding: 7px 12px 7px 12px;
            margin-right: 10px;
            margin-bottom: -15px;
            cursor: pointer;
            border: 1px solid #1e78de;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            color: #1e78de;
            border-radius: 5px;
        }

        .m button:hover {
            border: 1px solid #ED1B2F;
            color:#ED1B2F;
        }

        .teamfinder-dash {
            margin-top: 28px;
            background: white;
            border-radius: 15px;
            padding: 16px 18px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .teamfinder-dash h3 {
            margin: 0 0 6px;
            font-size: 1.15rem;
            color: #1a1a1a;
        }

        .teamfinder-dash .tf-actions button {
            margin-right: 8px;
            margin-top: 6px;
            padding: 6px 12px;
            border-radius: 5px;
            border: 1px solid #1e78de;
            background: white;
            color: #1e78de;
            cursor: pointer;
            font-size: 13px;
        }

        .teamfinder-dash .tf-actions button:hover {
            border-color: #ED1B2F;
            color: #ED1B2F;
        }

</style>

<body>
    <div class="container">

        <div class="topnav">

            <div class="left">
                <h3>McGill McSlot</h3>
            </div>

            <div class="right">
                <a href="homepage.html">Home</a>
                <a href="account.html">My Account</a>
            </div>

        </div>
        <br>

        <div class="ok">
            <div class="slide" id="slide1">

                    <div class="dashboard">

                        <div class="okay">
                            <h2 id="welcome-h">Welcome!</h2>
                        </div>

                        <div class="d2">
                            <img src="images/Dash.png" />
                            <a href="view.html">Dashboard</a>
                        </div>

                        <div class="d3">
                            <img src="images/Book.png" />
                            <a href="book.html">Book Appointment</a>
                        </div>

                        <div class="d4">
                            <img src="images/finder.png" />
                            <a href="teamup.html">TeamFinder</a>
                        </div>

                        <div class="d5">
                            <img src="images/account.png" />
                            <a href="homepage.html">Home</a>
                        </div>

                        <div class="d6">
                            <img src="images/logout.png" />
                            <a href="#" onclick="API.logout();return false;">Logout</a>
                        </div>

                        <div class="pic">
                            <img src="images/logo-ssmu.svg" />
                        </div>
                    
                    </div>

                    <button onclick="toggleDash()"><i class="fa fa-bars"></i></button>

                    
                </div>

                <div class="main">

                    <div class="name"> 
                        <h2>My Appointments</h2>
                        <p>View your meetings, group meetings, and reserved office hours slots here. </p>

                        <div class="m">
                            <a href="/api/appointments/export" style="text-decoration:none">
                                <button type="button">Export to Calendar</button>
                            </a>
                        </div>
     
                    </div>

                    <div class="view">
                        <div class="ok1">
                            <button class="button active" id="yikes" onclick="openTab('meetings', this)">Meetings</button>
                            <button class="button" onclick="openTab('group', this)">Group Meetings</button>
                            <button class="button" onclick="openTab('office', this)">Reserved Office Hours</button>
                        </div>

                        <div id="meetings" class="tab">

                            <div class="row header">
                                <div>Date</div>
                                <div>Time</div>
                                <div>Meeting With</div>
                                <div>Location</div>
                                <div>Actions</div>
                            </div>

                            <div id="meetingsList"></div>


                        </div>

                        <div id="group" class="tab" style="display:none">
                            <div id="groupList" style="padding:10px 0"></div>
                        </div>

                        <div id="office" class="tab" style="display:none">
                            <div class="row header">
                                <div>Date</div>
                                <div>Time</div>
                                <div>Meeting With</div>
                                <div>Location</div>
                                <div>Actions</div>
                            </div>

                            <div id="officeList"></div>
                        </div>
                    </div>


                </div>


        </div>

        


    </div>



   <script src="shared.js"></script>
   <script>

        function toggleDash() {
            document.getElementById("slide1").classList.toggle("hidden");
            document.querySelector(".main").classList.toggle("shifted");
        }

        function openTab(cityName, btn) {
            var i;
            var x = document.getElementsByClassName("tab");
            for (i = 0; i < x.length; i++) {
                x[i].style.display = "none";
            }
            document.getElementById(cityName).style.display = "block";

            var buttons = document.getElementsByClassName("button");
            for (i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }
            btn.classList.add("active");

            // group tab uses its own renderer, not the generic row-based one
            if (cityName === 'group') {
                renderGroupMeetings(cachedGroupMeetings);
            } else {
                renderTab(cityName);
            }
        }

        // backend-delivered appointments, bucketed by slot_type
        // meeting_request goes to meetings tab, office_hours goes to office tab
        const buckets = { meetings: [], office: [] };
        let cachedGroupMeetings = [];
        let dashUserId = null;

        async function loadAppointments() {
            const data = await API.get('/dashboard');
            const { appointments, groupMeetings } = data;
            buckets.meetings = [];
            buckets.office = [];

            appointments.forEach(a => {
                const entry = {
                    slotId: a.slotId,
                    date: a.date,
                    endTime: a.endTime ? a.endTime.slice(0, 8) : null,
                    time: `${a.startTime.slice(0,5)}-${a.endTime.slice(0,5)}`,
                    with: a.otherParty ? a.otherParty.name : '—',
                    email: a.otherParty ? a.otherParty.email : '',
                    where: ' ',
                    canCancel: a.canCancel,
                    type: a.slotType,
                };
                if (a.slotType === 'meeting_request') {
                    buckets.meetings.push(entry);
                } else if (a.slotType === 'office_hours') {
                    buckets.office.push(entry);
                }
            });

            cachedGroupMeetings = groupMeetings || [];
            renderTab('meetings');
            renderTab('office');
            renderGroupMeetings(cachedGroupMeetings);
        }

        function renderGroupMeetings(meetings) {
            const container = document.getElementById('groupList');
            container.innerHTML = '';

            if (!meetings.length) {
                container.innerHTML = '<p style="color:#888;font-size:14px;padding:12px">No group meetings yet.</p>';
                return;
            }

            meetings.forEach(gm => {
                const card = document.createElement('div');
                card.style.cssText = 'background:#f9f9f9;border:1px solid #e5e5e5;border-radius:10px;padding:14px 18px;margin-bottom:10px';

                const isVoting = gm.status === 'voting';

                // status badge
                let statusBadge = '';
                if (!isVoting) {
                    statusBadge = `<span style="margin-left:8px;font-size:12px;padding:2px 8px;border-radius:10px;background:#2a9d2a;color:white">Finalized</span>`;
                } else if (gm.hasVoted) {
                    statusBadge = `<span style="margin-left:8px;font-size:12px;padding:2px 8px;border-radius:10px;background:#f0a500;color:white">Voted</span>`;
                } else {
                    statusBadge = `<span style="margin-left:8px;font-size:12px;padding:2px 8px;border-radius:10px;background:#1e78de;color:white">Vote needed</span>`;
                }

                let subtext = '';
                if (isVoting && gm.hasVoted) {
                    subtext = `<div style="font-size:12px;color:#888;margin-top:3px">You have voted. You can update your selection.</div>`;
                } else if (isVoting && !gm.hasVoted) {
                    subtext = `<div style="font-size:12px;color:#b22d0a;margin-top:3px">You have not voted yet.</div>`;
                } else if (!isVoting && gm.finalizedDate) {
                    subtext = `<div style="font-size:13px;color:#444;margin-top:3px">
                        Chosen time: <b>${gm.finalizedDate}</b> &middot; ${gm.finalizedStart}–${gm.finalizedEnd}
                        ${gm.isRecurring ? `<span style="color:#888">(repeats ${gm.recurWeeks} week(s))</span>` : ''}
                    </div>`;
                }

                const actionBtn = isVoting
                    ? `<button onclick="window.location.href='group-poll-vote.html?pollId=${gm.id}'"
                               style="padding:6px 14px;border:1px solid #1e78de;color:#1e78de;background:white;border-radius:6px;cursor:pointer;font-size:13px">
                           ${gm.hasVoted ? 'Edit votes' : 'Vote now'}
                       </button>`
                    : `<button onclick="window.location.href='mailto:${gm.ownerEmail}'"
                               style="padding:6px 14px;border:1px solid #ccc;color:#555;background:white;border-radius:6px;cursor:pointer;font-size:13px">
                           Email organizer
                       </button>`;

                card.innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:flex-start">
                        <div>
                            <span style="font-weight:600;font-size:15px">${gm.title}</span>
                            ${statusBadge}
                            <div style="font-size:13px;color:#666;margin-top:3px">
                                Organized by
                                <a href="mailto:${gm.ownerEmail}" style="color:#1e78de;text-decoration:none">${gm.ownerName}</a>
                            </div>
                            ${subtext}
                        </div>
                        <div style="flex-shrink:0;margin-left:12px;display:flex;gap:8px;align-items:center">
                            <button id="gm-members-btn-${gm.id}"
                                    onclick="toggleGmMembers(${gm.id})"
                                    style="padding:6px 12px;border:1px solid #ccc;color:#555;background:white;border-radius:6px;cursor:pointer;font-size:13px">
                                Members ▾
                            </button>
                            ${actionBtn}
                        </div>
                    </div>
                    <div id="gm-members-panel-${gm.id}"
                         data-owner-name="${gm.ownerName}"
                         data-owner-email="${gm.ownerEmail}"
                         style="display:none;margin-top:10px;padding:10px 12px;background:#fff;border:1px solid #e5e5e5;border-radius:8px;font-size:13px">
                        <em style="color:#aaa">Loading…</em>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function toggleGmMembers(gmId) {
            const panel = document.getElementById(`gm-members-panel-${gmId}`);
            const btn = document.getElementById(`gm-members-btn-${gmId}`);
            if (panel.style.display !== 'none') {
                panel.style.display = 'none';
                btn.textContent = 'Members ▾';
                return;
            }
            panel.style.display = 'block';
            btn.textContent = 'Members ▴';

            if (panel.dataset.loaded) return;
            panel.dataset.loaded = '1';

            try {
                const data = await API.get(`/group-meetings/${gmId}`);
                const meeting = data.meeting;
                const ownerName = panel.dataset.ownerName;
                const ownerEmail = panel.dataset.ownerEmail;

                const others = (meeting.participants || []).filter(p => p.userId !== dashUserId);

                const makeRow = (name, email, tag = '') => `
                    <div style="padding:5px 0;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center">
                        <span>${name}${tag ? ` <span style="font-size:11px;color:#888;margin-left:4px">${tag}</span>` : ''}</span>
                        <a href="mailto:${email}" style="color:#1e78de;font-size:12px;text-decoration:none">${email}</a>
                    </div>`;

                const rows = [makeRow(ownerName, ownerEmail, '(organizer)')];
                others.forEach(p => {
                    const name = [p.firstName, p.lastName].filter(Boolean).join(' ') || p.email;
                    rows.push(makeRow(name, p.email));
                });

                panel.innerHTML = rows.join('');
            } catch (e) {
                panel.innerHTML = `<span style="color:#b22d0a">Could not load members.</span>`;
                panel.dataset.loaded = '';
            }
        }

        function renderTeamRequestsDash(requests, userId) {
            const container = document.getElementById('teamRequestsDashList');
            container.innerHTML = '';
            if (!requests.length) {
                const p = document.createElement('p');
                p.style.cssText = 'color:#888;font-size:14px;margin:0';
                p.textContent = 'No open team requests right now. ';
                const a = document.createElement('a');
                a.href = 'teamup.html';
                a.style.color = '#1e78de';
                a.textContent = 'Post one on TeamFinder';
                p.appendChild(a);
                container.appendChild(p);
                return;
            }
            requests.forEach((req) => {
                const full = req.maxMembers && req.memberCount >= req.maxMembers;
                const isCreator = req.creatorId === userId;
                const isMember = req.isMember;
                const card = document.createElement('div');
                card.style.cssText =
                    'border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:10px;background:#fafafa';
                const title = document.createElement('div');
                title.style.cssText = 'font-weight:bold;margin-bottom:4px';
                title.textContent = req.teamName;
                const meta = document.createElement('div');
                meta.style.cssText = 'font-size:13px;color:#666';
                meta.textContent =
                    req.courseCode +
                    ' · ' +
                    (req.creator.firstName || '') +
                    ' ' +
                    (req.creator.lastName || '') +
                    ' · Members ' +
                    req.memberCount +
                    '/' +
                    (req.maxMembers || '?');
                card.appendChild(title);
                card.appendChild(meta);
                if (req.description) {
                    const desc = document.createElement('div');
                    desc.style.cssText = 'font-size:13px;margin-top:8px;color:#444';
                    desc.textContent = req.description;
                    card.appendChild(desc);
                }
                if (full) {
                    const tag = document.createElement('div');
                    tag.style.cssText = 'margin-top:6px;font-size:12px;color:#b22d0a';
                    tag.textContent = 'Team full';
                    card.appendChild(tag);
                }
                const actions = document.createElement('div');
                actions.className = 'tf-actions';
                const mailBtn = document.createElement('button');
                mailBtn.type = 'button';
                mailBtn.textContent = 'Email creator';
                mailBtn.addEventListener('click', () => {
                    const sub = encodeURIComponent('McGill TeamFinder');
                    const body = encodeURIComponent(
                        'Hi,\n\nI saw your team post on McGill Bookings.\n'
                    );
                    window.location.href =
                        'mailto:' + req.creator.email + '?subject=' + sub + '&body=' + body;
                });
                actions.appendChild(mailBtn);
                if (!isCreator && !isMember && !full) {
                    const joinBtn = document.createElement('button');
                    joinBtn.type = 'button';
                    joinBtn.textContent = 'Join';
                    joinBtn.addEventListener('click', async () => {
                        try {
                            await API.post('/team-requests/' + req.id + '/join');
                            await loadAppointments();
                        } catch (e) {
                            alert('Could not join: ' + (e.message || 'error'));
                        }
                    });
                    actions.appendChild(joinBtn);
                }
                if (!isCreator && isMember) {
                    const leaveBtn = document.createElement('button');
                    leaveBtn.type = 'button';
                    leaveBtn.textContent = 'Leave';
                    leaveBtn.style.borderColor = '#888';
                    leaveBtn.style.color = '#555';
                    leaveBtn.addEventListener('click', async () => {
                        if (!confirm('Leave this team?')) return;
                        try {
                            await API.del('/team-requests/' + req.id + '/leave');
                            await loadAppointments();
                        } catch (e) {
                            alert('Could not leave: ' + (e.message || 'error'));
                        }
                    });
                    actions.appendChild(leaveBtn);
                }
                card.appendChild(actions);
                container.appendChild(card);
            });
        }

        function renderTab(type) {
            const container = document.getElementById(type + 'List');
            container.innerHTML = '';

            const items = buckets[type] || [];
            if (!items.length) {
                container.innerHTML =
                    '<div style="padding:12px;color:#888;font-size:14px">No appointments in this category yet.</div>';
                return;
            }

            items.forEach(m => {
                const row = document.createElement('div');
                row.className = 'row';

                const actions = [];
                if (m.email) actions.push(`<button onclick="sendEmail('${m.email}')">Email</button>`);
                const isPast = m.endTime && (new Date(`${m.date}T${m.endTime}`) < new Date());
                if (m.canCancel && !isPast) actions.push(`<button onclick="cancelBooking(${m.slotId})">Cancel</button>`);

                row.innerHTML = `
                    <div>${m.date}</div>
                    <div>${m.time}</div>
                    <div>${m.with}</div>
                    <div>${m.where}</div>
                    <div>${actions.join('')}</div>
                `;
                container.appendChild(row);
            });
        }

        function sendEmail(email) {
            window.location.href = `mailto:${email}`;
        }

        async function cancelBooking(slotId) {
            if (!confirm('Cancel this booking?')) return;
            try {
                const data = await API.del(`/slots/${slotId}/book`);
                if (data && data.notifyOwnerMailto) {
                    window.open(data.notifyOwnerMailto, '_blank');
                }
                await loadAppointments();
            } catch (e) {
                alert('Could not cancel: ' + e.message);
            }
        }

        async function init() {
            const user = await API.requireAuth();
            if (!user) return;
            if (user.isOwner) { window.location.href = 'owner-view.html'; return; }
            dashUserId = user.id;
            document.getElementById('welcome-h').textContent =
                `Welcome, ${user.firstName || 'user'}!`;
            await loadAppointments();
        }

        init();

        // fade out before navigating so sidebar clicks don't flash
        document.querySelectorAll('.slide a[href]').forEach(a => {
            a.addEventListener('click', e => {
                const href = a.getAttribute('href');
                if (!href || href === '#') return;
                e.preventDefault();
                document.body.style.transition = 'opacity 0.15s ease';
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = href; }, 150);
            });
        });
    </script>
</body>
</html>
